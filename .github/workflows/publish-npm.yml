# DISABLED: superseded by publish-npm-trusted.yml, which uses npm Trusted
# Publishers (OIDC) instead of a long-lived NPM_TOKEN. Kept on disk as a
# fallback in case we need to revert. To re-enable, restore the `release`
# trigger below
name: Publish NPM (disabled)
on:
  workflow_dispatch:

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    environment: stainless-pypi-release

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3.9.1
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Install dependencies
        run: |
          pnpm install

      - name: Publish to NPM
        run: |
          bash ./bin/publish-npm
        env:
          NPM_TOKEN: ${{ secrets.CARTESIA_NPM_TOKEN || secrets.NPM_TOKEN }}
