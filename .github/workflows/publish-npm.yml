# This workflow stages the package on NPM for maintainer approval.
# It runs automatically when release-please publishes a GitHub Release, and
# can also be run manually by navigating to https://www.github.com/cartesia-ai/cartesia-js/actions/workflows/publish-npm.yml
name: Stage NPM
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  stage:
    name: stage
    runs-on: ubuntu-latest
    # Guard so this only runs on the production repo — the file also exists in
    # the staging repo via promotion, and publishing must never happen there.
    if: github.repository == 'cartesia-ai/cartesia-js'
    permissions:
      contents: read
      id-token: write
    environment: stainless-pypi-release

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install dependencies
        run: |
          pnpm install

      - name: Stage package on NPM
        run: |
          bash ./bin/publish-npm
