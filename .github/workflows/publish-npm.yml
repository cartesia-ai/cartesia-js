# This workflow stages the package on NPM for maintainer approval.
# You can run this workflow manually by navigating to https://www.github.com/cartesia-ai/cartesia-js/actions/workflows/publish-npm.yml
name: Stage NPM
on:
  workflow_dispatch:

jobs:
  stage:
    name: stage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: stainless-pypi-release

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Install dependencies
        run: |
          pnpm install

      - name: Stage package on NPM
        run: |
          bash ./bin/publish-npm
