# Publishes to npm using a Trusted Publisher (OIDC) instead of a long-lived
# NPM_TOKEN. See https://docs.npmjs.com/trusted-publishers.
#
# This workflow is triggered when a GitHub release is created. It can also be
# run manually to re-publish if it failed for some reason.
name: Publish NPM (Trusted)
on:
  workflow_dispatch:

  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    environment: stainless-pypi-release

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Pin npm to a version that supports trusted publishing
        run: npm install -g npm@11.15.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Publish to NPM
        working-directory: dist
        run: |
          set -eux

          PACKAGE_NAME="$(jq -r -e '.name' ./package.json)"
          VERSION="$(jq -r -e '.version' ./package.json)"

          # Look up the current latest version on npm so we can pick a sensible
          # dist-tag. Mirrors the logic in bin/publish-npm.
          NPM_INFO="$(npm view "$PACKAGE_NAME" version --json 2>/dev/null || true)"

          if echo "$NPM_INFO" | jq -e '.error.code == "E404"' > /dev/null 2>&1; then
            LAST_VERSION=""
          elif echo "$NPM_INFO" | jq -e '.error' > /dev/null 2>&1; then
            echo "ERROR: npm returned unexpected data:"
            echo "$NPM_INFO"
            exit 1
          else
            LAST_VERSION="$(echo "$NPM_INFO" | jq -r '.')"
          fi

          CURRENT_IS_PRERELEASE=false
          if [[ "$VERSION" =~ -([a-zA-Z]+) ]]; then
            CURRENT_IS_PRERELEASE=true
            CURRENT_TAG="${BASH_REMATCH[1]}"
          fi

          LAST_IS_STABLE_RELEASE=true
          if [[ -z "$LAST_VERSION" || "$LAST_VERSION" =~ -([a-zA-Z]+) ]]; then
            LAST_IS_STABLE_RELEASE=false
          fi

          if $CURRENT_IS_PRERELEASE && $LAST_IS_STABLE_RELEASE; then
            TAG="$CURRENT_TAG"
          else
            TAG="latest"
          fi

          npm stage publish --tag "$TAG" --access public
