name: Trigger staging back-sync on release

# On a published release, notify the staging repo to sync from production immediately.
# This workflow is dispatch-only: it cannot write production or staging contents.
on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    if: github.repository == 'cartesia-ai/cartesia-js'
    environment: production
    env:
      STAGING_REPO: cartesia-ai/cartesia-js-staging
    steps:
      # Mint a short-lived token from the stlc GitHub App, scoped to the
      # staging repo only (Contents:Write there is what GitHub requires to
      # send a repository_dispatch). This runs on the PRODUCTION repo, so the
      # app secrets must exist in its `production` environment — the app's
      # key can mint tokens for every repo the app is installed on, so keep
      # it environment-scoped rather than a plain repo secret.
      - name: Mint a token to dispatch to staging
        id: staging-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.STLC_APP_ID }}
          private-key: ${{ secrets.STLC_APP_PRIVATE_KEY }}
          owner: cartesia-ai
          repositories: cartesia-js-staging

      - name: Dispatch back-sync to staging
        env:
          DISPATCH_TOKEN: ${{ steps.staging-token.outputs.token }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          [ -n "${DISPATCH_TOKEN:-}" ] || { echo "staging-token was not minted" >&2; exit 1; }
          payload=$(jq -n --arg ref "$REF_NAME" '{event_type:"prod-released",client_payload:{ref:$ref}}')
          code=$(curl -sS -o /tmp/dispatch.txt -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${STAGING_REPO}/dispatches" \
            -d "$payload")
          if [ "$code" = "204" ]; then
            echo "Back-sync dispatched to ${STAGING_REPO}."
          else
            echo "Dispatch failed (HTTP $code)" >&2; cat /tmp/dispatch.txt >&2; exit 1
          fi
